spring.application.name=sobi_backend

spring.datasource.url=jdbc:postgresql://localhost:5432/sobi
spring.datasource.username=sobiuser
spring.datasource.password=sobipass
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=sobi_b103_103b_park_yang_yang_hwang_kim_jjang_jjang
app.jwt.access-token-expiration=21600000
app.jwt.refresh-token-expiration=604800000

# MQTT
app.mqtt.broker-url=tcp://localhost:1883
app.mqtt.client-id=sobi-backend-subscriber
app.mqtt.topic-pattern=basket/+/update

# ttl
app.basket.cache-ttl-seconds=7200

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# AI Recommendation Server
app.ai.recommendation-url=http://172.26.6.236:9000/recommend
app.ai.connection-timeout=5000
app.ai.read-timeout=10000

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true

# SpringDoc OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.defaultModelExpandDepth=-1